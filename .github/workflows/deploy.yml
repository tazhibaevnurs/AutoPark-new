# Деплой на сервер: после пуша в main или вручную (Actions → Deploy → Run)
# Секреты: DEPLOY_HOST, DEPLOY_USER, SSH_PRIVATE_KEY; опционально DEPLOY_PATH
name: Deploy

on:
  workflow_dispatch:   # Ручной запуск из вкладки Actions
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/autopark' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            git fetch origin
            git reset --hard origin/main
            docker compose build --no-cache
            docker compose up -d
            echo "Deploy finished."
