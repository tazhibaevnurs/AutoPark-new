# Autopark — запуск для разработки и продакшена
services:
  web:
    build: .
    container_name: autopark-web
    ports:
      - "80:8000"    # основной доступ без порта в URL (http://IP/)
      - "8000:8000" # запасной доступ (http://IP:8000/)
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_PATH=/data/db.sqlite3
    volumes:
      - media_volume:/app/media
      - data_volume:/data
    restart: unless-stopped

volumes:
  media_volume:
  data_volume:
