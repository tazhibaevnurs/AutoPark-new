{% extends 'base.html' %}
{% load static %}

{% block title %}Постановка на учёт — заявка | AUTOPARK{% endblock %}
{% block body_class %}page-inner postanovka-page{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/inner.css' %}">
<link rel="stylesheet" href="{% static 'postanovka/app.css' %}">
{% endblock %}

{% block content %}
<div id="postanovka-root" class="postanovka-root"></div>
<script>
  window.__POSTANOVKA_DATA__ = {
    formAction: "{{ form_action }}",
    csrfToken: "{{ csrf_token }}",
    successUrl: "{{ success_url }}",
    errors: {{ form_errors_json|safe }}
  };
</script>
<script type="module" src="{% static 'postanovka/app.js' %}"></script>
{% endblock %}
