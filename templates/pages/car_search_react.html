{% extends 'base.html' %}
{% load static %}

{% block title %}Поиск автомобилей — персональный подбор | AUTOPARK{% endblock %}
{% block body_class %}page-inner poisk-avto-page{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/inner.css' %}">
<link rel="stylesheet" href="{% static 'poisk-avto/app.css' %}">
{% endblock %}

{% block content %}
<div id="poisk-avto-root" class="poisk-avto-root"></div>
<script>
  window.__POISK_AVTO_DATA__ = {
    formAction: "{{ form_action }}",
    csrfToken: "{{ csrf_token }}",
    successUrl: "{{ success_url }}",
    errors: {{ form_errors_json|safe }}
  };
</script>
<script type="module" src="{% static 'poisk-avto/app.js' %}"></script>
{% endblock %}
