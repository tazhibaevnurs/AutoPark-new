{% extends 'base.html' %}
{% load static %}

{% block title %}Выкуп автомобиля — заявка | AUTOPARK{% endblock %}
{% block body_class %}page-inner vykup-page{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/inner.css' %}">
<link rel="stylesheet" href="{% static 'vykup/app.css' %}">
{% endblock %}

{% block content %}
<div id="vykup-root" class="vykup-root"></div>
{{ form_errors|json_script:"buyout-errors-data" }}
<script>
  window.__VYKUP_DATA__ = {
    formAction: "{{ form_action }}",
    csrfToken: "{{ csrf_token }}",
    successUrl: "{{ success_url }}",
    errors: JSON.parse(document.getElementById('buyout-errors-data').textContent)
  };
</script>
<script type="module" src="{% static 'vykup/app.js' %}"></script>
{% endblock %}
