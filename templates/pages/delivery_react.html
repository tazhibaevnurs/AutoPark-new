{% extends 'base.html' %}
{% load static %}

{% block title %}Доставка авто — заявка | AUTOPARK{% endblock %}
{% block body_class %}page-inner delivery-page{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/inner.css' %}">
<link rel="stylesheet" href="{% static 'delivery/app.css' %}">
<style>
  .delivery-root,
  .delivery-root *,
  .delivery-root *::before,
  .delivery-root *::after {
    font-family: var(--font) !important;
  }

  .delivery-root form button[type="submit"] {
    min-height: 62px;
    padding: 1rem 1.1rem !important;
    border: 2px solid #E98733 !important;
    border-radius: 12px !important;
    background: #E98733 !important;
    color: #fff !important;
    font-size: 1.08rem !important;
    font-weight: 700 !important;
    transition: background .2s, color .2s, border-color .2s, transform .2s;
  }
  .delivery-root form button[type="submit"]:hover {
    background: transparent !important;
    color: #E98733 !important;
    border-color: #E98733 !important;
    transform: translateY(-1px);
  }
</style>
{% endblock %}

{% block content %}
<div id="delivery-root" class="delivery-root"></div>
{{ form_errors|json_script:"delivery-errors-data" }}
<script src="{% static 'js/lead-form-honeypot-shim.js' %}"></script>
<script>
  window.__DELIVERY_DATA__ = {
    formAction: "{{ form_action }}",
    csrfToken: "{{ csrf_token }}",
    successUrl: "{{ success_url }}",
    errors: JSON.parse(document.getElementById('delivery-errors-data').textContent)
  };
</script>
<script type="module" src="{% static 'delivery/app.js' %}"></script>
{% endblock %}
