{% load static %}
<div id="cookie-consent" class="cookie-consent" role="dialog" aria-label="Уведомление о cookies" aria-live="polite" hidden>
  <div class="cookie-consent-inner">
    <p class="cookie-consent-text">
      Мы используем файлы cookie для работы сайта и улучшения вашего опыта. Продолжая просмотр, вы соглашаетесь с нашей
      <a href="https://drive.google.com/uc?export=download&id=13KE5cE9HXU4fGGIKitZcfQ7LuJvJJJxp" target="_blank" rel="noopener">политикой конфиденциальности</a>.
    </p>
    <div class="cookie-consent-actions">
      <button type="button" class="cookie-consent-btn cookie-consent-accept" data-action="accept">Принять</button>
      <button type="button" class="cookie-consent-btn cookie-consent-reject" data-action="reject">Отклонить</button>
    </div>
  </div>
</div>
